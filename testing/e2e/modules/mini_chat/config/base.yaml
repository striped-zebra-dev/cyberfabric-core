# Mini-Chat development configuration
#
# Minimal config for developing/testing the mini-chat module.
# Based on quickstart.yaml but stripped to essentials.
#
# Usage:
#   cargo run --bin hyperspot-server --features mini-chat -- --config config/mini-chat.yaml run

server:
  home_dir: "~/.hyperspot"

database:
  servers:
    sqlite_users:
      engine: "sqlite"
      params:
        WAL: "true"
        synchronous: "NORMAL"
        busy_timeout: "5000"
      pool:
        max_conns: 5
        acquire_timeout: "30s"

logging:
  default:
    console_level: info
    file: "logs/hyperspot.log"
    file_level: info
  sqlx:
    console_level: debug
    file: "logs/sql.log"
    file_level: debug
  api-gateway:
    console_level: debug
    file: "logs/api.log"
    file_level: debug

modules:
  api-gateway:
    config:
      bind_addr: "127.0.0.1:8087"
      prefix_path: "/cf"
      enable_docs: true
      cors_enabled: false
      openapi:
        title: "Mini-Chat Dev API"
        version: "0.1.0"
        description: "Mini-Chat development server"
      defaults:
        body_limit_bytes: 64000000
        rate_limit:
          rps: 1000
          burst: 200
          in_flight: 64
      auth_disabled: true

  module-orchestrator:
    config: {}

  grpc-hub:
    config:
      listen_addr: "uds:///tmp/hyperspot-grpc"

  authn-resolver:
    config:
      vendor: "hyperspot"

  authz-resolver:
    config:
      vendor: "hyperspot"

  static-authn-plugin:
    config:
      vendor: "hyperspot"
      priority: 100
      mode: accept_all
      s2s_credentials:
        - client_id: "mini-chat"
          client_secret: "mini-chat-dev-secret"

  static-authz-plugin:
    config:
      vendor: "hyperspot"
      priority: 100

  tenant-resolver:
    config:
      vendor: "hyperspot"

  single-tenant-tr-plugin:
    config: {}

  simple-user-settings:
    database:
      server: "sqlite_users"
      file: "settings.db"
    config:
      max_field_length: 100

  oagw:
    config:
      proxy_timeout_secs: 30
      allow_http_upstream: false

  file-parser:
    config:
      allowed_local_base_dir: /tmp

  mini-chat:
    database:
      server: "sqlite_users"
      file: "mini_chat.db"
    config:
      # S2S credentials for obtaining SecurityContext
      # that will be used for communication with other modules.
      client_credentials:
        client_id: "mini-chat"
        client_secret: "mini-chat-dev-secret"
      # Provider registry. Key = provider_id (matches ModelCatalogEntry.provider_id).
      # `upstream_alias` is optional — defaults to `host` when omitted.
      providers:
        openai:
          kind: openai_responses
          storage_kind: openai
          host: "api.openai.com"
          auth_plugin_type: "gts.x.core.oagw.auth_plugin.v1~x.core.oagw.apikey.v1"
          auth_config:
            header: "Authorization"
            prefix: "Bearer "
            secret_ref: "openai-key"

        azure_openai:
          kind: openai_responses
          storage_kind: azure
          host: "genai-openai-dev-swedencentral-main01.openai.azure.com"
          api_path: "/openai/v1/responses"
          api_version: "2025-03-01-preview"
          storage_backend: "azure"
          supports_file_search_filters: false
          auth_plugin_type: "gts.x.core.oagw.auth_plugin.v1~x.core.oagw.apikey.v1"
          auth_config:
            header: "api-key"
            prefix: ""
            secret_ref: "azure-openai-key"

  static-mini-chat-model-policy-plugin:
    config:
      vendor: "hyperspot"
      priority: 100
      model_catalog:
        - model_id: "gpt-5.2"
