[[systems]]
name = "cyberfabric"
slug = "cf"
kit = "sdlc"

[[systems.autodetect]]
kit = "sdlc"
system_root = "{project_root}/modules/$system"
artifacts_root = "{system_root}/docs"

[systems.autodetect.artifacts]
[systems.autodetect.artifacts.PRD]
pattern = "PRD.md"
traceability = "FULL"
required = true

[systems.autodetect.artifacts.DESIGN]
pattern = "DESIGN.md"
traceability = "FULL"
required = true

[systems.autodetect.artifacts.ADR]
pattern = "ADR/*.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.DECOMPOSITION]
pattern = "DECOMPOSITION.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.FEATURE]
pattern = "features/*.md"
traceability = "FULL"
required = false

[systems.autodetect.validation]
require_kind_registered_in_kit = true
require_md_extension = true
fail_on_unmatched_markdown = true

[[systems.autodetect.codebase]]
name = "Modules"
path = "{system_root}/src"
extensions = [".rs"]

[[systems.autodetect.codebase]]
name = "Tests"
path = "{system_root}/tests"
extensions = [".rs"]

